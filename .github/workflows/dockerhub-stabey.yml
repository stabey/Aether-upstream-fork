name: Build DockerHub Image (stabey)

on:
  pull_request:
    branches:
      - personal
  workflow_dispatch:
    inputs:
      target_ref:
        description: Git ref to build
        required: true
        type: string
      image:
        description: DockerHub image, without docker.io/
        required: true
        default: stabey/aether
        type: string
      tag:
        description: Primary image tag
        required: true
        type: string
      push_latest:
        description: Also push latest
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: dockerhub-stabey-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: Resolve build variables
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.vars.outputs.ref }}
      image: ${{ steps.vars.outputs.image }}
      tag: ${{ steps.vars.outputs.tag }}
      push_latest: ${{ steps.vars.outputs.push_latest }}
    steps:
      - id: vars
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_REF: ${{ github.event.inputs.target_ref }}
          INPUT_IMAGE: ${{ github.event.inputs.image }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          INPUT_PUSH_LATEST: ${{ github.event.inputs.push_latest }}
          PR_HEAD_REF: ${{ github.head_ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            ref="${INPUT_REF}"
            image="${INPUT_IMAGE}"
            tag="${INPUT_TAG}"
            push_latest="${INPUT_PUSH_LATEST}"
          else
            short_sha="${PR_HEAD_SHA:0:12}"
            sanitized_ref="$(echo "${PR_HEAD_REF}" | tr '/' '-' | tr -cd '[:alnum:]._-')"
            ref="${PR_HEAD_REF}"
            image="stabey/aether"
            tag="pr-${PR_NUMBER}-${sanitized_ref}-${short_sha}"
            push_latest="false"
          fi
          {
            echo "ref=${ref}"
            echo "image=${image}"
            echo "tag=${tag}"
            echo "push_latest=${push_latest}"
          } >> "$GITHUB_OUTPUT"

  frontend:
    name: Build frontend
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.setup.outputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v5
        with:
          name: frontend-dist
          path: frontend/dist/
          if-no-files-found: error
          retention-days: 1

  build:
    name: Build ${{ matrix.name }}
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: linux-amd64
            target: x86_64-unknown-linux-musl
            arch: amd64
          - name: linux-arm64
            target: aarch64-unknown-linux-musl
            arch: arm64
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.setup.outputs.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: dockerhub-stabey-${{ matrix.target }}
          workspaces: . -> target

      - name: Install cross
        uses: taiki-e/install-action@cross

      - name: Build
        env:
          AETHER_VERSION: ${{ needs.setup.outputs.tag }}
          CARGO_TERM_COLOR: always
        run: cross build --release --locked -p aether-gateway --target ${{ matrix.target }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v5
        with:
          name: aether-gateway-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/aether-gateway
          if-no-files-found: error
          retention-days: 1

  docker:
    name: Docker multi-arch
    needs: [setup, frontend, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.setup.outputs.ref }}

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Prepare dist layout
        run: |
          set -euo pipefail
          mkdir -p dist
          cp artifacts/aether-gateway-amd64/aether-gateway dist/aether-gateway-amd64
          cp artifacts/aether-gateway-arm64/aether-gateway dist/aether-gateway-arm64
          chmod +x dist/aether-gateway-amd64 dist/aether-gateway-arm64
          cp -r artifacts/frontend-dist dist/frontend

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: stabey
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare image tags
        id: image-tags
        env:
          IMAGE: ${{ needs.setup.outputs.image }}
          PRIMARY_TAG: ${{ needs.setup.outputs.tag }}
          PUSH_LATEST: ${{ needs.setup.outputs.push_latest }}
        run: |
          set -euo pipefail
          image="docker.io/${IMAGE}"
          short_sha="$(git rev-parse --short=12 HEAD)"

          {
            echo "tags<<EOF"
            echo "${image}:${PRIMARY_TAG}"
            echo "${image}:sha-${short_sha}"
            if [ "${PUSH_LATEST}" = "true" ]; then
              echo "${image}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.app
          push: true
          tags: ${{ steps.image-tags.outputs.tags }}
          platforms: linux/amd64,linux/arm64
