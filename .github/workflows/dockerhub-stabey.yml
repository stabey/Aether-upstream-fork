name: Build DockerHub Image (stabey)

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: Git ref to build
        required: true
        default: fix/usage-pending-request-capture-upstream
        type: string
      image:
        description: DockerHub image, without docker.io/
        required: true
        default: stabey/aether
        type: string
      tag:
        description: Primary image tag
        required: true
        default: pr-4-usage-pending-request-capture
        type: string
      push_latest:
        description: Also push latest
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: dockerhub-stabey-${{ github.event.inputs.target_ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.target_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v5
        with:
          name: frontend-dist
          path: frontend/dist/
          if-no-files-found: error
          retention-days: 1

  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: linux-amd64
            target: x86_64-unknown-linux-musl
            arch: amd64
          - name: linux-arm64
            target: aarch64-unknown-linux-musl
            arch: arm64
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.target_ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: dockerhub-stabey-${{ matrix.target }}
          workspaces: . -> target

      - name: Install cross
        uses: taiki-e/install-action@cross

      - name: Build
        env:
          AETHER_VERSION: ${{ github.event.inputs.tag }}
          CARGO_TERM_COLOR: always
        run: cross build --release --locked -p aether-gateway --target ${{ matrix.target }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v5
        with:
          name: aether-gateway-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/aether-gateway
          if-no-files-found: error
          retention-days: 1

  docker:
    name: Docker multi-arch
    needs: [frontend, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.target_ref }}

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Prepare dist layout
        run: |
          set -euo pipefail
          mkdir -p dist
          cp artifacts/aether-gateway-amd64/aether-gateway dist/aether-gateway-amd64
          cp artifacts/aether-gateway-arm64/aether-gateway dist/aether-gateway-arm64
          chmod +x dist/aether-gateway-amd64 dist/aether-gateway-arm64
          cp -r artifacts/frontend-dist dist/frontend

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: stabey
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare image tags
        id: image-tags
        run: |
          set -euo pipefail
          image="docker.io/${{ github.event.inputs.image }}"
          primary_tag="${{ github.event.inputs.tag }}"
          short_sha="$(git rev-parse --short=12 HEAD)"

          {
            echo "tags<<EOF"
            echo "${image}:${primary_tag}"
            echo "${image}:sha-${short_sha}"
            if [ "${{ github.event.inputs.push_latest }}" = "true" ]; then
              echo "${image}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.app
          push: true
          tags: ${{ steps.image-tags.outputs.tags }}
          platforms: linux/amd64,linux/arm64
